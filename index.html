<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <title>Marked in the browser</title>
</head>

<body>
    <div id="content"></div>
    <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
    <script type="text/javascript" src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.2.7/purify.min.js"></script>
    <script>
        const owner = 'cupprum';
        const repo = 'recipes';
        const path = 'recipes';
        const url = `https://api.github.com/repos/${owner}/${repo}/contents/${path}`;

        fetch(url)
            .then(response => {
                if (!response.ok) {
                    throw new Error('Failed to fetch list of files:', response.statusText);
                }
                return response.json();
            })
            .then(files => {
                return files
                    .filter(file => file.type === 'file')
                    .map(file => file.download_url);
            })
            .then(urls => {
                let i = Math.floor(Math.random() * urls.length);
                let url = urls[i];

                const contentDiv = document.getElementById('content');
                fetch(url)
                    .then(response => {
                        if (!response.ok) {
                            throw new Error('Failed to fetch markdown file:', response.statusText);
                        }
                        return response.text();
                    })
                    .then(markdown => {
                        const html = DOMPurify.sanitize(marked.parse(markdown));
                        const recipeDiv = document.createElement('div');
                        recipeDiv.innerHTML = html;
                        contentDiv.appendChild(recipeDiv);
                    })
                    .catch(error => {
                        console.error('There was a problem with fetching the markdown file:', error);
                    });
            })
            .catch(error => {
                console.error('There was a problem with fetching a recipe: ', error);
            });
    </script>
</body>

</html>
