<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Recipe - Card Stack</title>
    <style>
        body {
            background-color: #f3f4f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 60px 20px;
            display: flex;
            justify-content: center;
            color: #2d3436;
        }

        .container {
            max-width: 450px;
            width: 100%;
            text-align: center;
        }

        /* 1. Name Section */
        h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 40px;
            letter-spacing: -1.5px;
        }

        .section {
            background: #ffffff;
            border-radius: 24px;
            padding: 30px;
            margin-bottom: 20px;
            border: 1px solid #e1e4e8;
        }

        h2 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #a0aec0;
            margin-bottom: 20px;
        }

        /* 2. Ingredients - Pill Style */
        .ingredient-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .tag {
            background: #f8f9fa;
            border: 1px solid #edf2f7;
            padding: 8px 16px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        /* 3. Steps - Clean & Spaced */
        .step-list {
            text-align: left;
            padding: 0;
            margin: 0;
            list-style: none;
        }

        .step-item {
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
        }

        .step-num {
            background: #2d3436;
            color: white;
            min-width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
        }

        .step-text {
            font-size: 1rem;
            color: #4a5568;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Matcha Latte</h1>

        <div class="section">
            <h2>Ingredients</h2>
            <div class="ingredient-tags">
                <span class="tag">1 tsp Matcha</span>
                <span class="tag">2 oz Hot Water</span>
                <span class="tag">6 oz Oat Milk</span>
                <span class="tag">Honey</span>
            </div>
        </div>

        <div class="section">
            <h2>Steps</h2>
            <div class="step-list">
                <div class="step-item">
                    <div class="step-num">1</div>
                    <div class="step-text">Sift matcha into a bowl to remove any clumps.</div>
                </div>
                <div class="step-item">
                    <div class="step-num">2</div>
                    <div class="step-text">Add hot water and whisk in a "W" motion until frothy.</div>
                </div>
                <div class="step-item">
                    <div class="step-num">3</div>
                    <div class="step-text">Steam milk and pour over the matcha base.</div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
